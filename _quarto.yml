project:
  type: website
  output-dir: _site
  resources:
    - "google*.html"

website:
  title: "Guan-Fu Chou"
  description: "Personal website of Guan-Fu Chou, PhD student in Higher Education at the University of Michigan. Research on higher education finance, financial aid policy, and postsecondary-labor market alignment."
  site-url: "https://guanfuchou.github.io"
  repo-url: "https://github.com/guanfuchou/guanfuchou.github.io"

  open-graph:
    locale: en_US
    site-name: "Guan-Fu Chou"

  twitter-card:
    card-style: summary

  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: research.qmd
        text: Research
      - href: cv.qmd
        text: CV
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/guanfuchou
        aria-label: GitHub
      - icon: envelope
        href: mailto:gfchou@umich.edu
        aria-label: Email

  page-footer:
    left: "© 2026 Guan-Fu Chou"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: [cosmo, custom.scss]
    css: styles.css
    toc: false
    page-layout: full
    fontsize: 1.05em
    linkcolor: "#00274C"
    mainfont: "Source Sans Pro, system-ui, sans-serif"
    include-in-header:
      - text: |
          <meta name="author" content="Guan-Fu Chou">
          <meta name="keywords" content="Guan-Fu Chou, higher education finance, financial aid policy, postsecondary labor market alignment, causal inference, education economics, University of Michigan, CSHPE, EPI Fellow">
          <meta name="DC.title" content="Guan-Fu Chou">
          <meta name="DC.creator" content="Chou, Guan-Fu">
          <meta name="DC.subject" content="Higher Education Finance; Financial Aid Policy; Education Economics; Postsecondary-Labor Market Alignment">
          <meta name="DC.description" content="PhD student in Higher Education at the University of Michigan. Research on higher education finance, financial aid policy, and postsecondary-labor market alignment.">
          <meta name="DC.publisher" content="University of Michigan">
          <meta name="DC.contributor" content="Center for the Study of Higher and Postsecondary Education">
          <meta name="DC.type" content="Text">
          <meta name="DC.format" content="text/html">
          <meta name="DC.identifier" content="https://guanfuchou.github.io">
          <meta name="DC.language" content="en">
          <link rel="canonical" href="https://guanfuchou.github.io">
